name: CI (docs)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  docs:
    runs-on: tuw-runner

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git-lfs build-essential cmake
          git lfs install

      - name: Setup Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
          components: rustfmt, clippy

      - name: Rust Cache
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Install Cargo Dependencies
        run: |
          cargo install just

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Docs
        run: just rustdoc