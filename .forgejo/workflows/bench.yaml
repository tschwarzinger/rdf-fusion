name: Performance Comparison

on:
  pull_request:
    branches: [ main ]
    # Trigger when PR is updated or when labels are added/removed
    types: [opened, synchronize, labeled, unlabeled]

jobs:
  benchmark:
    runs-on: tuw-runner
    if: contains(join(github.event.pull_request.labels.*.name, ','), 'bench')

    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          apt-get install -y git-lfs build-essential cmake default-jre-headless
          git lfs install

      - name: Setup Rust
        uses: https://github.com/dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.94

      - name: Rust Cache
        uses: https://github.com/Swatinem/rust-cache@v2

      - name: Install Cargo Dependencies
        run: |
          cargo install just taplo-cli critcmp

      - name: Checkout PR Code
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0 # Required to checkout the base SHA later

      - name: Cache Main Baselines
        id: cache-main-benches
        uses: actions/cache@v4
        with:
          # Caching the entire Criterion directory will cache both main and old candidate runs.
          # The candidate runs will just get overwritten later in the workflow.
          path: target/criterion
          key: benchmark-main-${{ github.event.pull_request.base.sha }}

      - name: Compute Main Baselines (On Cache Miss)
        if: steps.cache-main-benches.outputs.cache-hit != 'true'
        run: |
          echo "No cached main benchmarks found. Computing them now..."
          
          # 1. Switch to the commit on main that this PR targets
          git checkout ${{ github.event.pull_request.base.sha }}
          git clean -fd
          
          # 2. Run benches for main
          just prepare-benches
          cargo bench --bench scalar -- --save-baseline main-scalar
          cargo bench --bench scalar_binary -- --save-baseline main-scalar_binary
          cargo bench --bench store -- --save-baseline main-store
          cargo bench --bench bsbm_explore -- --save-baseline main-bsbm_explore
          cargo bench --bench bsbm_business_intelligence -- --save-baseline main-bsbm_business_intelligence
          cargo bench --bench wind_farm -- --save-baseline main-wind_farm
          
          # 3. Switch back to the PR merge commit to continue
          git checkout ${{ github.sha }} 
          git clean -fd

      - name: Prepare Benches (Candidate)
        run: |
          # Ensure we are on the PR commit and prep again if needed
          just prepare-benches

      - name: Run Benchmarks Candidate Branch
        run: |
          cargo bench --bench scalar -- --save-baseline candidate-scalar
          cargo bench --bench scalar_binary -- --save-baseline candidate-scalar_binary
          cargo bench --bench store -- --save-baseline candidate-store
          cargo bench --bench bsbm_explore -- --save-baseline candidate-bsbm_explore
          cargo bench --bench bsbm_business_intelligence -- --save-baseline candidate-bsbm_business_intelligence
          cargo bench --bench wind_farm -- --save-baseline candidate-wind_farm

      - name: Compare Benchmarks
        run: |
          critcmp main-scalar candidate-scalar
          critcmp main-scalar_binary candidate-scalar_binary
          critcmp main-store candidate-store
          critcmp main-bsbm_explore candidate-bsbm_explore
          critcmp main-bsbm_business_intelligence candidate-bsbm_business_intelligence
          critcmp main-wind_farm candidate-wind_farm